<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Invitación</title>

<style>

body{
  margin:0;
  overflow:hidden;
  background:#f5efe4;
  font-family: serif;
}

.scene{
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ENTRADA SOBRE */
@keyframes enter {
  0% { transform: translateX(120vw) rotateY(180deg) scale(.6); opacity:0; }
  70% { transform: translateX(-10px) rotateY(20deg) scale(1.02); opacity:1; }
  100% { transform: translateX(0) rotateY(0) scale(1); opacity:1; }
}

.envelope{
  position:relative;
  width:320px;
  height:220px;
  animation: enter 2s ease forwards;
  transform-style:preserve-3d;
}

/* BASE */
.base{
  position:absolute;
  inset:0;
  background:#d7b98c;
  border:1px solid #b48b5f;
  border-radius:20px;
  overflow:hidden;
}

/* SOLAPA */
.flap{
  position:absolute;
  top:0;
  width:100%;
  height:55%;
  background:#c8a372;
  clip-path:polygon(0 0, 50% 100%, 100% 0);
  transform-origin:top;
  transition:1s ease;
  z-index:5;
}

.flap.open{
  transform:rotateX(180deg);
}

/* SELLO */
.seal{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:80px;
  height:80px;
  border-radius:50%;
  background:#8e1d1d;
  border:4px solid #6e1111;
  color:#f6d8b5;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  z-index:10;
  transition:.4s;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%,100%{ transform:translate(-50%,-50%) scale(1); }
  50%{ transform:translate(-50%,-50%) scale(1.05); }
}

.seal.hide{
  opacity:0;
  pointer-events:none;
}

/* CARTA */
.letter{
  position:absolute;
  left:50%;
  bottom:10px;
  transform:translateX(-50%);
  width:85%;
  height:85%;
  background:white;
  border-radius:18px;
  overflow:hidden;
  z-index:2;
  transition:1s ease;
}

/* SALE DEL SOBRE */
.letter.up{
  transform:translate(-50%,-140px);
}

/* FULL SCREEN */
.letter.full{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  transform:none !important;
  border-radius:0;
  z-index:999;
}

/* CONTENIDO */
.letter img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.25);
}

.content{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  text-align:center;
  padding:20px;
}

button{
  margin-top:20px;
  padding:14px 24px;
  border:none;
  border-radius:999px;
  background:#8e1d1d;
  color:white;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="scene">

  <div class="envelope" id="env">

    <div class="base"></div>

    <div class="letter" id="letter">

      <img src="https://images.unsplash.com/photo-1517842645767-c639042777db?q=80&w=1200&auto=format&fit=crop"/>

      <div class="overlay"></div>

      <div class="content">
        <h1 style="font-weight:300">Nuestra Invitación</h1>
        <p style="max-width:260px">Aquí irá el PDF final</p>

        <button onclick="fullscreen()">Abrir invitación</button>
      </div>

    </div>

    <div class="flap" id="flap"></div>

    <div class="seal" id="seal">L</div>

  </div>

</div>

<script>

let stage = 0;

const seal = document.getElementById("seal");
const flap = document.getElementById("flap");
const letter = document.getElementById("letter");

seal.onclick = () => {

  if(stage !== 0) return;

  stage = 1;

  flap.classList.add("open");
  seal.classList.add("hide");

  setTimeout(() => {
    letter.classList.add("up");
  }, 600);

};

function fullscreen(){

  stage = 2;

  letter.classList.add("full");

  if(navigator.vibrate){
    navigator.vibrate(20);
  }

}

</script>

</body>
</html>
